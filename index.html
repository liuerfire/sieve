<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sieve Output</title>
  <style>
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #1f1a17;
      background: linear-gradient(180deg, #faf4eb 0%, #efe5d6 100%);
    }
    main {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0 72px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(36px, 7vw, 72px);
      letter-spacing: -0.05em;
    }
    p {
      color: #6b6259;
    }
    .grid {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }
    article {
      padding: 20px 22px;
      border-radius: 22px;
      background: rgba(255, 250, 242, 0.88);
      border: 1px solid rgba(72, 53, 33, 0.1);
      box-shadow: 0 18px 40px rgba(56, 38, 20, 0.08);
    }
    h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    a {
      color: #7c3f15;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sieve Output</h1>
    <p>Generated every hour from the configured sources.</p>
    <section class="grid">
      <article><h2>cnBeta.com - 中文业界资讯站</h2><p>cnbeta</p><div><a href="cnbeta.html">HTML</a> · <a href="cnbeta.xml">RSS</a></div></article>
<article><h2>hacker-news</h2><p>hacker-news</p><div><a href="hacker-news.html">HTML</a> · <a href="hacker-news.xml">RSS</a></div></article>
<article><h2>Phoronix</h2><p>phoronix</p><div><a href="phoronix.html">HTML</a> · <a href="phoronix.xml">RSS</a></div></article>
<article><h2>Superset Releases</h2><p>superset-releases</p><div><a href="superset-releases.html">HTML</a> · <a href="superset-releases.xml">RSS</a></div></article>
<article><h2>Claude Code Releases</h2><p>claude-code-releases</p><div><a href="claude-code-releases.html">HTML</a> · <a href="claude-code-releases.xml">RSS</a></div></article>
    </section>
  </main>
</body>
</html>
