name: Sieve Auto Aggregator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:      # 支持手动点击运行

jobs:
  build-and-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build Sieve
        run: make build

      - name: Restore Database Cache
        uses: actions/cache@v4
        with:
          path: sieve.db
          key: ${{ runner.os }}-sieve-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sieve-db-

      - name: Refresh Sieve Database
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: ./bin/sieve serve --refresh-now

      - name: Upload Database Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sieve-db
          path: sieve.db
